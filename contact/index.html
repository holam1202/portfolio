<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <h1>Contact me</h1>

    <form action="mailto:hol064@ucsd.edu">
        
        <label>
            Email:
            <input type="email" name="email" value="example@gmail.com">
        </label>

        <label>
            Subject:
            <input type="text" name="subject" value="Hello">
        </label>

        <label>
            Message:
            <textarea name="body">Nice to meet you!</textarea>
        </label>

        <button>Send</button>

    </form>

    <script type="module" src="../global.js"></script>
</body>
</html>
